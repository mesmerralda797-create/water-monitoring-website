<!DOCTYPE html>
<html>
<head>
    <title>ESP32 Real-time Monitor</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <h1>Water Purity Monitor</h1>
    <div id="dashboard">
        <p>Temperature: <span id="temp">--</span>°C</p>
        <p>TDS Level: <span id="tds">--</span> ppm</p>
        <p>Water Level: <span id="dist">--</span> cm</p>
    </div>

    <script>
        const socket = io("http://localhost:3000"); // Update with your server IP

        socket.on('sensorUpdate', (data) => {
            document.getElementById('temp').innerText = data.temp;
            document.getElementById('tds').innerText = data.tds;
            document.getElementById('dist').innerText = data.distance;
        });
    </script>
</body>
</html>
