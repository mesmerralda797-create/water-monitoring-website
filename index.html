<!DOCTYPE html>
<html>
<head>
    <title>Water Quality Monitor Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard">
        <div class="gauge">Wat Level: <span id="level">0</span>%</div>
        <div class="gauge">TDS: <span id="tds">0</span> ppm</div>
        <div class="gauge">Temp: <span id="temp">0</span> °C</div>
        
        <div class="chart-container">
            <canvas id="historyChart"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
